<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbFilms24 - Watch Movie in HD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            line-height: 1.5;
        }
        .watch-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        /* Navigation Bar */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #e50914);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .back-btn {
            background: rgba(30, 30, 42, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover {
            background: #e50914;
            border-color: #e50914;
        }
        /* Movie Hero Section */
        .movie-hero {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .movie-poster {
            flex-shrink: 0;
        }
        .movie-poster img {
            width: 280px;
            border-radius: 20px;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.5);
        }
        .movie-details {
            flex: 1;
        }
        .movie-title {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 16px;
            line-height: 1.2;
        }
        .movie-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 24px;
            color: #ccc;
            font-size: 15px;
        }
        .movie-meta span {
            background: #1e1e2a;
            padding: 6px 14px;
            border-radius: 30px;
        }
        .movie-overview {
            font-size: 16px;
            color: #bbb;
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 700px;
        }
        /* Player Section */
        .player-section {
            margin: 30px 0;
        }
        .player-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.6);
        }
        .player-wrapper iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            display: block;
        }
        /* Server Buttons */
        .server-selector {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .server-btn {
            background: #1e1e2a;
            border: 1px solid #333;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .server-btn:hover {
            background: #333;
        }
        .server-btn.active {
            background: #e50914;
            border-color: #e50914;
        }
        /* Points Button */
        .points-action {
            margin-top: 30px;
            text-align: center;
        }
        .earn-points-btn {
            background: linear-gradient(135deg, #e50914, #b81d24);
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(229,9,20,0.3);
        }
        .earn-points-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(229,9,20,0.4);
        }
        /* Responsive */
        @media (max-width: 768px) {
            .movie-poster img { width: 180px; }
            .movie-title { font-size: 28px; }
            .watch-container { padding: 15px; }
            .movie-hero { gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="watch-container">
        <div class="nav-bar">
            <div class="logo">AlbFilms<span style="color:#e50914;">24</span></div>
            <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back to Home</button>
        </div>

        <div id="movieContent">
            <div class="movie-hero">
                <div class="movie-poster">
                    <img id="poster" src="" alt="Movie Poster">
                </div>
                <div class="movie-details">
                    <h1 class="movie-title" id="title">Loading...</h1>
                    <div class="movie-meta" id="meta"></div>
                    <div class="movie-overview" id="overview"></div>
                </div>
            </div>

            <div class="player-section">
                <div class="player-wrapper">
                    <iframe id="player" allowfullscreen allow="autoplay; fullscreen"></iframe>
                </div>
                <div class="server-selector" id="serverList"></div>
            </div>

            <div class="points-action">
                <button id="earnPointsBtn" class="earn-points-btn"><i class="fas fa-coins"></i> I watched it - Earn 10 Points!</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ REPLACE WITH YOUR ACTUAL FIREBASE CONFIGURATION (SAME AS INDEX.HTML) ⚠️
        const firebaseConfig = {
            apiKey: "AIzaSyDummyReplaceWithYours",
            authDomain: "albfilms24.firebaseapp.com",
            projectId: "albfilms24",
            storageBucket: "albfilms24.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abc123"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');
        const TMDB_API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
        const TMDB_IMG_URL = 'https://image.tmdb.org/t/p/w500';

        async function loadMovie() {
            if (!movieId) {
                document.getElementById('title').innerText = 'Invalid Movie ID';
                return;
            }
            try {
                const res = await fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${TMDB_API_KEY}&language=en-US`);
                const movie = await res.json();
                document.getElementById('title').innerText = movie.title;
                document.getElementById('poster').src = movie.poster_path ? TMDB_IMG_URL + movie.poster_path : 'https://via.placeholder.com/300x450?text=No+Poster';
                document.getElementById('overview').innerText = movie.overview || 'No description available.';
                document.getElementById('meta').innerHTML = `
                    <span><i class="fas fa-calendar-alt"></i> ${movie.release_date?.split('-')[0] || 'N/A'}</span>
                    <span><i class="fas fa-star"></i> ${movie.vote_average?.toFixed(1)}/10 (${movie.vote_count?.toLocaleString()} votes)</span>
                    <span><i class="fas fa-clock"></i> ${movie.runtime || 'N/A'} min</span>
                `;
                const servers = [
                    { name: "🎬 VidSrc (HD)", url: `https://vidsrcme.ru/embed/movie/${movieId}` },
                    { name: "🎥 2Embed (HD)", url: `https://www.2embed.cc/embed/${movieId}` }
                ];
                const serverContainer = document.getElementById('serverList');
                serverContainer.innerHTML = '';
                servers.forEach((server, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'server-btn';
                    btn.innerText = server.name;
                    btn.onclick = () => {
                        document.getElementById('player').src = server.url;
                        document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    };
                    serverContainer.appendChild(btn);
                    if (idx === 0) setTimeout(() => btn.click(), 100);
                });
            } catch (error) {
                console.error('Error loading movie:', error);
                document.getElementById('title').innerText = 'Error loading movie details';
            }
        }

        const earnBtn = document.getElementById('earnPointsBtn');
        earnBtn.addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) {
                alert('Please login first to earn points!');
                return;
            }
            try {
                const userRef = doc(db, 'users', user.uid);
                await updateDoc(userRef, { points: increment(10) });
                alert('+10 points! Thank you for watching.');
                earnBtn.disabled = true;
                earnBtn.style.opacity = '0.5';
            } catch (error) {
                console.error('Error adding points:', error);
                alert('Could not add points. Make sure you are logged in.');
            }
        });

        loadMovie();
    </script>
</body>
</html>
