<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbFilms24 - Watch Movie</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }
        h2 {
            margin-bottom: 10px;
        }
        iframe {
            width: 100%;
            height: 520px;
            border: none;
            border-radius: 12px;
            background: #000;
        }
        .servers {
            margin: 15px 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .server-btn {
            padding: 10px 15px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.2s;
        }
        .server-btn:hover {
            background: #333;
        }
        .server-btn.active {
            background: #e50914;
            border-color: #e50914;
        }
        .back, .earn-points {
            display: inline-block;
            margin-top: 20px;
            color: #e50914;
            text-decoration: none;
            margin-right: 15px;
        }
        .earn-points {
            background: #e50914;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
        }
        .loading {
            color: #ccc;
            margin: 20px;
        }
        .movie-info {
            margin-bottom: 20px;
            text-align: left;
            background: #111;
            padding: 15px;
            border-radius: 12px;
        }
        .movie-info p {
            margin: 5px 0;
            color: #ccc;
        }
        @media (max-width: 768px) {
            iframe { height: 300px; }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h2 id="title">Loading...</h2>
    <div class="movie-info" id="movieInfo"></div>
    <div class="servers" id="servers"></div>
    <iframe id="player" allowfullscreen allow="autoplay; fullscreen"></iframe>
    <div>
        <a href="javascript:history.back()" class="back">← Back</a>
        <button id="earnPointsBtn" class="earn-points">✅ I watched it (Earn 10 points)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Firebase Configuration (SAME AS IN INDEX.HTML)
    const firebaseConfig = {
        apiKey: "AIzaSyDummyKeyReplaceWithYours",  // <-- ZEVENDESOJE
        authDomain: "albfilms24.firebaseapp.com",  // <-- ZEVENDESOJE
        projectId: "albfilms24",                  // <-- ZEVENDESOJE
        storageBucket: "albfilms24.appspot.com",  // <-- ZEVENDESOJE
        messagingSenderId: "123456789012",        // <-- ZEVENDESOJE
        appId: "1:123456789012:web:abc123def456"  // <-- ZEVENDESOJE
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get('id');
    const TMDB_API_KEY = '7a98db423d6e3a5ee922a3e51a09d135'; // <-- ZEVENDESOJE

    async function loadMovie() {
        if (!movieId) {
            document.getElementById('title').innerText = 'Invalid movie ID';
            return;
        }
        document.getElementById('title').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading movie details...';
        try {
            const response = await fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${TMDB_API_KEY}&language=en-US`);
            const movie = await response.json();
            document.getElementById('title').innerHTML = movie.title;
            document.getElementById('movieInfo').innerHTML = `
                <p><strong>Release Date:</strong> ${movie.release_date || 'N/A'} | <strong>Rating:</strong> ⭐ ${movie.vote_average?.toFixed(1)}/10</p>
                <p><strong>Overview:</strong> ${movie.overview || 'No description available.'}</p>
            `;

            // Define streaming servers (replace with your actual embed URLs if needed)
            const servers = [
                { name: "Server 1 (Auto)", url: `https://vidsrc.xyz/embed/movie/${movieId}` },
                { name: "Server 2 (2Embed)", url: `https://www.2embed.cc/embed/${movieId}` }
            ];

            const serversDiv = document.getElementById('servers');
            serversDiv.innerHTML = '';
            servers.forEach((server, idx) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn';
                btn.innerText = server.name;
                btn.onclick = () => {
                    document.getElementById('player').src = server.url;
                    document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                };
                serversDiv.appendChild(btn);
                if (idx === 0) setTimeout(() => btn.click(), 200);
            });
        } catch (error) {
            console.error('Error loading movie:', error);
            document.getElementById('title').innerText = 'Error loading movie details.';
        }
    }

    const earnPointsBtn = document.getElementById('earnPointsBtn');
    earnPointsBtn.addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) {
            alert('Please login first to earn points!');
            return;
        }
        try {
            const userRef = doc(db, 'users', user.uid);
            await updateDoc(userRef, {
                points: increment(10)
            });
            alert('+10 points! Thank you for watching.');
            earnPointsBtn.disabled = true;
            earnPointsBtn.style.opacity = '0.5';
        } catch (error) {
            console.error('Error adding points:', error);
            alert('Could not add points. Make sure you are logged in.');
        }
    });

    loadMovie();
</script>
</body>
</html>
