<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbFilms24 - Filma dhe Seriale HD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0f; color: #fff; }
        .sidebar { position: fixed; left: 0; top: 0; width: 80px; height: 100vh; background: #111; display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 30px; z-index: 100; }
        .sidebar i { font-size: 24px; color: #aaa; cursor: pointer; transition: 0.2s; }
        .sidebar i:hover { color: #e50914; }
        .main { margin-left: 80px; padding: 20px 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; }
        .brand { font-size: 28px; font-weight: bold; }
        .brand span { color: #e50914; }
        .search-box { display: flex; gap: 10px; align-items: center; }
        #searchInput { padding: 10px 18px; border-radius: 40px; border: none; background: #1e1e2a; color: white; width: 260px; }
        #userIcon { font-size: 32px; cursor: pointer; }
        .hero-slider { margin-bottom: 40px; border-radius: 20px; overflow: hidden; }
        .swiper { width: 100%; height: 480px; }
        .swiper-slide { position: relative; }
        .slide-bg { width: 100%; height: 100%; object-fit: cover; }
        .slide-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, rgba(0,0,0,0.8), transparent); }
        .slide-content { position: absolute; bottom: 60px; left: 50px; max-width: 500px; }
        .slide-content h2 { font-size: 42px; margin-bottom: 10px; }
        .btn-primary { background: #e50914; border: none; padding: 12px 28px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; }
        .genres { display: flex; flex-wrap: wrap; gap: 12px; margin: 30px 0; }
        .genres button { background: #1e1e2a; border: none; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer; }
        .genres button:hover { background: #e50914; }
        .section-title { font-size: 24px; margin: 40px 0 20px 0; border-left: 4px solid #e50914; padding-left: 15px; }
        /* Rrjet fleksibël – PA horizontal scroll */
        .movies-grid, .tv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        .movie-card, .tv-card {
            background: #1a1a2a;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }
        .movie-card:hover, .tv-card:hover { transform: translateY(-6px); }
        .poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .card-icons {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            padding: 5px 8px;
            border-radius: 20px;
            z-index: 5;
        }
        .card-icons i { cursor: pointer; font-size: 14px; }
        .card-info { padding: 10px; }
        .card-info h4 { font-size: 15px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-info p { font-size: 12px; color: #aaa; }
        /* Preview i pasur (hover) */
        .preview-rich {
            position: absolute;
            width: 340px;
            background: #1a1a2a;
            border-radius: 16px;
            overflow: hidden;
            z-index: 2000;
            box-shadow: 0 10px 25px black;
            border: 1px solid #333;
        }
        .preview-trailer iframe { width: 100%; height: 190px; border: none; }
        .preview-info { padding: 12px; }
        .preview-info h4 { font-size: 16px; margin-bottom: 6px; }
        .preview-meta { display: flex; gap: 12px; font-size: 12px; color: #ccc; margin-bottom: 8px; }
        .preview-overview { font-size: 12px; color: #bbb; margin-bottom: 8px; }
        /* Modal, panel, toast – stilet ekzistuese */
        .modal { display: none; position: fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:3000;align-items:center;justify-content:center; }
        .modal-content { background:#1e1e2a; max-width:400px; width:90%; border-radius:24px; padding:20px; }
        .close-modal { float:right; font-size:28px; cursor:pointer; }
        .auth-tabs { display:flex; gap:15px; margin:15px 0; }
        .tab-btn { background:none; border:none; color:#ccc; padding:5px; cursor:pointer; }
        .tab-btn.active { color:#e50914; border-bottom:2px solid #e50914; }
        .auth-form { display:none; flex-direction:column; gap:12px; }
        .auth-form.active { display:flex; }
        .auth-form input { padding:10px; border-radius:30px; border:none; background:#2a2a35; color:white; }
        .btn-google { background:white; color:black; padding:10px; border-radius:30px; cursor:pointer; }
        .user-panel { position:fixed; top:80px; right:20px; width:300px; background:#141414; border-radius:16px; padding:15px; z-index:1500; border:1px solid #333; display:none; }
        .panel-points { background:#222; padding:10px; border-radius:12px; margin-bottom:10px; }
        .btn-small { background:#e50914; border:none; color:white; padding:4px 12px; border-radius:20px; cursor:pointer; }
        .toast { position:fixed; bottom:30px; right:30px; background:#e50914; padding:12px 20px; border-radius:40px; z-index:3500; opacity:0; transition:0.3s; }
        .toast.show { opacity:1; }
        @media (max-width: 768px) {
            .main { margin-left: 70px; padding: 10px; }
            .movies-grid, .tv-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo" style="font-weight:bold;">AF</div>
    <i class="fas fa-home"></i>
    <i class="fas fa-film"></i>
    <i class="fas fa-tv"></i>
    <i class="fas fa-star"></i>
</div>

<div class="main">
    <div class="header">
        <h1 class="brand">AlbFilms<span>24</span></h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Kërko film ose serial...">
            <i id="userIcon" class="fas fa-user-circle" style="font-size: 32px; cursor: pointer;"></i>
        </div>
    </div>

    <!-- Slideri -->
    <div class="hero-slider">
        <div class="swiper heroSwiper">
            <div class="swiper-wrapper" id="heroSlider"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <!-- Zhanret -->
    <div class="genres">
        <button onclick="loadGenre(28)">Aksion</button>
        <button onclick="loadGenre(35)">Komedi</button>
        <button onclick="loadGenre(18)">Dramë</button>
        <button onclick="loadGenre(27)">Tmerr</button>
        <button onclick="loadGenre(878)">SF</button>
        <button onclick="loadGenre(10749)">Romancë</button>
    </div>

    <!-- Filma -->
    <h2 class="section-title">🔥 Më të shikuarit</h2>
    <div class="movies-grid" id="trendingGrid"></div>

    <h2 class="section-title">⭐ Më të vlerësuarit</h2>
    <div class="movies-grid" id="topRatedGrid"></div>

    <h2 class="section-title">📅 Të sapoardhur</h2>
    <div class="movies-grid" id="upcomingGrid"></div>

    <!-- Serialet (TV) -->
    <h2 class="section-title">📺 Serialet më të njohura</h2>
    <div class="tv-grid" id="tvGrid"></div>

    <div id="searchResultsContainer" style="display:none;">
        <h2 class="section-title">🔍 Rezultatet e kërkimit</h2>
        <div class="movies-grid" id="searchGrid"></div>
    </div>
</div>

<!-- Modal Login -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Hyr</button>
            <button class="tab-btn" data-tab="register">Regjistrohu</button>
        </div>
        <div id="loginForm" class="auth-form active">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Fjalëkalimi">
            <button id="loginBtn" class="btn-primary">Hyr</button>
            <button id="googleLoginBtn" class="btn-google"><i class="fab fa-google"></i> Vazhdo me Google</button>
        </div>
        <div id="registerForm" class="auth-form">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Fjalëkalimi">
            <button id="registerBtn" class="btn-primary">Krijo llogari</button>
        </div>
    </div>
</div>

<!-- Panel përdoruesi -->
<div id="userPanel" class="user-panel">
    <div><strong id="userName"></strong> <i id="closePanel" class="fas fa-times" style="float:right; cursor:pointer;"></i></div>
    <div class="panel-points">🪙 Pikët: <span id="userPoints">0</span> <button id="redeemAdFreeBtn" class="btn-small">Hiq reklamat (2000p)</button></div>
    <div id="adFreeStatus"></div>
    <div><h4>❤️ Favoritet</h4><div id="favoritesList"></div></div>
    <div><h4>⏰ Shiko më vonë</h4><div id="watchlistList"></div></div>
    <button id="logoutBtn" class="btn-primary" style="width:100%; margin-top:10px;">Dilni</button>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script type="module">
    // ================= FIREBASE CONFIG (Zëvendëso me të dhënat e tua) =================
    const firebaseConfig = {
        apiKey: "AIzaSyDummyReplaceWithYours",
        authDomain: "albfilms24.firebaseapp.com",
        projectId: "albfilms24",
        storageBucket: "albfilms24.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abc123"
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const TMDB_API_KEY = '7a98db423d6e3a5ee922a3e51a09d135';
    const TMDB_IMG = 'https://image.tmdb.org/t/p/w500';
    const TMDB_BACKDROP = 'https://image.tmdb.org/t/p/original';

    let currentUser = null;
    let swiper = null;
    let activePreview = null;

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Krijon kartelën për film
    function createCard(item, isTv = false, containerId) {
        const card = document.createElement('div');
        card.className = isTv ? 'tv-card' : 'movie-card';
        card.setAttribute('data-id', item.id);
        const title = item.title || item.name;
        const date = item.release_date || item.first_air_date;
        const year = date ? date.split('-')[0] : '?';
        const vote = item.vote_average ? item.vote_average.toFixed(1) : '?';
        card.innerHTML = `
            <div class="card-icons">
                <i class="far fa-heart" data-action="fav" data-id="${item.id}" data-title="${title.replace(/'/g, "\\'")}" data-poster="${item.poster_path || ''}" data-type="${isTv ? 'tv' : 'movie'}"></i>
                <i class="far fa-clock" data-action="wl" data-id="${item.id}" data-title="${title.replace(/'/g, "\\'")}" data-poster="${item.poster_path || ''}" data-type="${isTv ? 'tv' : 'movie'}"></i>
            </div>
            <img class="poster" src="${item.poster_path ? TMDB_IMG+item.poster_path : 'https://via.placeholder.com/300x450?text=No+Image'}" alt="${title}">
            <div class="card-info">
                <h4>${title}</h4>
                <p>${year} ⭐ ${vote}</p>
            </div>
        `;
        // Hover preview (edhe për TV, por do të tregojë vetëm info, jo trailer)
        let hoverTimeout;
        card.addEventListener('mouseenter', (e) => {
            hoverTimeout = setTimeout(() => showRichPreview(item.id, card, isTv), 350);
        });
        card.addEventListener('mouseleave', () => {
            clearTimeout(hoverTimeout);
            if (activePreview) activePreview.remove();
        });
        card.addEventListener('click', (e) => {
            if (e.target.tagName === 'I') return;
            if (isTv) window.location.href = `tv.html?id=${item.id}`;
            else window.location.href = `watch.html?id=${item.id}`;
        });
        document.getElementById(containerId).appendChild(card);
        return card;
    }

    async function showRichPreview(id, cardEl, isTv = false) {
        if (activePreview) activePreview.remove();
        try {
            const type = isTv ? 'tv' : 'movie';
            const [detailsRes, creditsRes] = await Promise.all([
                fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_API_KEY}&language=sq`),
                fetch(`https://api.themoviedb.org/3/${type}/${id}/credits?api_key=${TMDB_API_KEY}`)
            ]);
            const data = await detailsRes.json();
            const credits = await creditsRes.json();
            const cast = credits.cast?.slice(0, 3).map(c => c.name).join(', ') || 'N/A';
            const title = data.title || data.name;
            const year = (data.release_date || data.first_air_date || '').split('-')[0] || '?';
            const runtime = data.runtime ? data.runtime + ' min' : (data.number_of_episodes ? `${data.number_of_episodes} episode` : '?');
            const preview = document.createElement('div');
            preview.className = 'preview-rich';
            preview.innerHTML = `
                <div class="preview-info">
                    <h4>${title} (${year})</h4>
                    <div class="preview-meta">⭐ ${data.vote_average?.toFixed(1)}/10 | 🎬 ${runtime}</div>
                    <div class="preview-overview">${data.overview?.substring(0, 130)}...</div>
                    <div class="preview-cast"><strong>Aktorët:</strong> ${cast}</div>
                </div>
            `;
            document.body.appendChild(preview);
            activePreview = preview;
            const rect = cardEl.getBoundingClientRect();
            preview.style.top = rect.top + window.scrollY + 'px';
            preview.style.left = rect.left + rect.width + 10 + 'px';
            if (parseInt(preview.style.left) + 360 > window.innerWidth) {
                preview.style.left = rect.left - 370 + 'px';
            }
        } catch(e) { console.error(e); }
    }

    // Ngarkimi i filmave
    async function loadGrid(endpoint, gridId, limit = 12) {
        const res = await fetch(`https://api.themoviedb.org/3${endpoint}?api_key=${TMDB_API_KEY}&language=sq`);
        const data = await res.json();
        const grid = document.getElementById(gridId);
        grid.innerHTML = '';
        data.results.slice(0, limit).forEach(m => createCard(m, false, gridId));
    }

    // Ngarkimi i serialeve nga TMDB (popullore)
    async function loadTVShows() {
        const res = await fetch(`https://api.themoviedb.org/3/tv/popular?api_key=${TMDB_API_KEY}&language=sq`);
        const data = await res.json();
        const grid = document.getElementById('tvGrid');
        grid.innerHTML = '';
        data.results.slice(0, 20).forEach(show => createCard(show, true, 'tvGrid'));
    }

    // Slideri
    async function loadHeroSlider() {
        const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_API_KEY}&language=sq`);
        const data = await res.json();
        const slides = data.results.slice(0, 5);
        const wrapper = document.getElementById('heroSlider');
        wrapper.innerHTML = '';
        slides.forEach(m => {
            const div = document.createElement('div');
            div.className = 'swiper-slide';
            div.innerHTML = `
                <img class="slide-bg" src="${TMDB_BACKDROP + m.backdrop_path}" alt="${m.title}">
                <div class="slide-overlay"></div>
                <div class="slide-content">
                    <h2>${m.title}</h2>
                    <p>${m.overview?.substring(0, 120)}...</p>
                    <button class="btn-primary" onclick="location.href='watch.html?id=${m.id}'">Shiko Tani</button>
                </div>
            `;
            wrapper.appendChild(div);
        });
        if (swiper) swiper.destroy();
        swiper = new Swiper('.heroSwiper', { loop: true, autoplay: { delay: 5000 }, navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }, pagination: { el: '.swiper-pagination', clickable: true } });
    }

    // Kërkimi (filma dhe seriale)
    window.searchMovies = async function(query) {
        if (!query || query.length < 2) { document.getElementById('searchResultsContainer').style.display = 'none'; return; }
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=sq`);
        const data = await res.json();
        const results = data.results.filter(r => r.media_type === 'movie' || r.media_type === 'tv').slice(0, 12);
        const grid = document.getElementById('searchGrid');
        grid.innerHTML = '';
        results.forEach(item => {
            const isTv = item.media_type === 'tv';
            createCard(item, isTv, 'searchGrid');
        });
        document.getElementById('searchResultsContainer').style.display = results.length ? 'block' : 'none';
    };

    // Ngarkimi i zhanrit për filma (rreshti i parë)
    window.loadGenre = async function(genreId) {
        const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&with_genres=${genreId}&language=sq`);
        const data = await res.json();
        const grid = document.getElementById('trendingGrid');
        grid.innerHTML = '';
        data.results.slice(0, 12).forEach(m => createCard(m, false, 'trendingGrid'));
    };

    // Firebase operacionet (favorite, watchlist, points)
    async function toggleFavorite(item) { if (!currentUser) { showToast('Hyni së pari!'); return; } const ref = doc(db, 'users', currentUser.uid); const snap = await getDoc(ref); const favs = snap.data()?.favorites || []; const exists = favs.some(f => f.id === item.id && f.type === item.type); const favItem = { id: item.id, title: item.title, poster: item.poster, type: item.type }; await updateDoc(ref, { favorites: exists ? arrayRemove(favItem) : arrayUnion(favItem) }); showToast(exists ? 'U hoq nga favoritet' : 'U shtua në favorit'); }
    async function toggleWatchlist(item) { if (!currentUser) { showToast('Hyni së pari!'); return; } const ref = doc(db, 'users', currentUser.uid); const snap = await getDoc(ref); const wl = snap.data()?.watchlist || []; const exists = wl.some(w => w.id === item.id && w.type === item.type); const wlItem = { id: item.id, title: item.title, poster: item.poster, type: item.type }; await updateDoc(ref, { watchlist: exists ? arrayRemove(wlItem) : arrayUnion(wlItem) }); showToast(exists ? 'U hoq nga Watch Later' : 'U ruajt për më vonë'); }

    // Auth state
    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        const panel = document.getElementById('userPanel');
        if (user) {
            panel.style.display = 'block';
            document.getElementById('userName').innerText = user.email.split('@')[0];
            const userRef = doc(db, 'users', user.uid);
            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('userPoints').innerText = data.points || 0;
                    document.getElementById('adFreeStatus').innerText = data.adFreeUntil && new Date(data.adFreeUntil) > new Date() ? '✅ Pa reklama' : '⚠️ Reklamat aktive';
                    const favDiv = document.getElementById('favoritesList');
                    favDiv.innerHTML = (data.favorites || []).map(f => `<div>${f.type === 'tv' ? '📺' : '🎬'} ${f.title} <button class="remove-fav" data-id="${f.id}" data-type="${f.type}" data-title="${f.title.replace(/'/g, "\\'")}" data-poster="${f.poster || ''}">❌</button></div>`).join('');
                    const wlDiv = document.getElementById('watchlistList');
                    wlDiv.innerHTML = (data.watchlist || []).map(w => `<div>${w.type === 'tv' ? '📺' : '🎬'} ${w.title} <button class="remove-wl" data-id="${w.id}" data-type="${w.type}" data-title="${w.title.replace(/'/g, "\\'")}" data-poster="${w.poster || ''}">❌</button></div>`).join('');
                } else setDoc(userRef, { points: 0, favorites: [], watchlist: [], adFreeUntil: null });
            });
        } else panel.style.display = 'none';
    });

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', (e) => { window.searchMovies(e.target.value); });
    document.getElementById('userIcon').onclick = () => document.getElementById('authModal').style.display = 'flex';
    document.querySelector('.close-modal').onclick = () => document.getElementById('authModal').style.display = 'none';
    document.getElementById('loginBtn').onclick = async () => { const email=document.getElementById('loginEmail').value, pwd=document.getElementById('loginPassword').value; try{ await signInWithEmailAndPassword(auth, email, pwd); document.getElementById('authModal').style.display='none'; showToast('Hyrja u krye!'); }catch(e){ showToast(e.message); } };
    document.getElementById('registerBtn').onclick = async () => { const email=document.getElementById('regEmail').value, pwd=document.getElementById('regPassword').value; try{ await createUserWithEmailAndPassword(auth, email, pwd); document.getElementById('authModal').style.display='none'; showToast('Llogaria u krijua!'); }catch(e){ showToast(e.message); } };
    document.getElementById('googleLoginBtn').onclick = async () => { try{ await signInWithPopup(auth, provider); document.getElementById('authModal').style.display='none'; }catch(e){ showToast(e.message); } };
    document.getElementById('logoutBtn').onclick = () => signOut(auth);
    document.getElementById('redeemAdFreeBtn').onclick = async () => { if(!currentUser)return; const ref=doc(db,'users',currentUser.uid); const snap=await getDoc(ref); const pts=snap.data()?.points||0; if(pts>=2000){ await updateDoc(ref,{points:pts-2000,adFreeUntil:new Date(Date.now()+30*86400000).toISOString()}); showToast('Reklamat u hoqën për 30 ditë!'); location.reload(); } else showToast(`Nuk ke mjaft pikë. Ke ${pts} nga 2000.`); };
    document.getElementById('closePanel').onclick = () => document.getElementById('userPanel').style.display = 'none';
    document.querySelectorAll('.tab-btn').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.auth-form').forEach(f=>f.classList.remove('active')); document.getElementById(btn.dataset.tab==='login'?'loginForm':'registerForm').classList.add('active'); }; });

    // Initial load
    loadGrid('/trending/movie/week', 'trendingGrid');
    loadGrid('/movie/top_rated', 'topRatedGrid');
    loadGrid('/movie/upcoming', 'upcomingGrid');
    loadTVShows();
    loadHeroSlider();
